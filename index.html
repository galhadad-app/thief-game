<style>
:root{--bg:#05060a;--panel:#101827;--gold:#d9b45f;--gold2:#f3d993;--cyan:#66e7ff;--red:#ff4c6a;--green:#58f29a;--muted:#aeb6c8;--text:#f8f3e7;--line:rgba(217,180,95,.18)}

.app{width:min(1000px,100%);margin:0 auto;padding:14px 10px 70px}
.screen{display:none}.screen.active{display:block}.gameOn .hero{display:none}
.hero{text-align:center;padding:10px 4px 12px}.logo{width:76px;height:76px;margin:0 auto 10px;border-radius:24px;display:grid;place-items:center;font-size:36px;background:linear-gradient(135deg,#182033,#05070d);border:1px solid var(--line)}

.tag{max-width:620px;margin:8px auto 0;color:var(--muted);font-size:14px;line-height:1.5}
.panel{max-width:680px;margin:12px auto 0;display:grid;gap:12px}.card{background:linear-gradient(180deg,rgba(18,25,40,.95),rgba(7,9,16,.98));border:1px solid var(--line);border-radius:22px;box-shadow:0 24px 80px rgba(0,0,0,.45);padding:16px}

.btn:disabled{opacity:.55}.btn.secondary{color:#f7f2e5;background:linear-gradient(135deg,#171d2c,#0b0f1a);border:1px solid var(--line)}.btn.green{background:linear-gradient(135deg,#58f29a,#d5ffe3);color:#06110a}.btn.danger{background:linear-gradient(135deg,#ff4c6a,#9b1730);color:#fff}.btn.small{width:auto;min-height:38px;padding:8px 11px;border-radius:13px;font-size:13px}
input{width:100%;border:1px solid rgba(217,180,95,.15);background:#080d18;color:#fff;padding:14px;border-radius:16px;font-size:16px;outline:none;text-align:center}.small{font-size:13px;color:var(--muted);line-height:1.45}.center{text-align:center}.row{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap}
.avatarGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:10px 0}.avatar{background:#0b1020;border:1px solid rgba(217,180,95,.14);border-radius:16px;min-height:48px;font-size:24px;cursor:pointer}.avatar.active{border-color:var(--gold);box-shadow:0 0 0 4px rgba(217,180,95,.1)}
.modeGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}.mode{background:#0b1020;border:1px solid rgba(217,180,95,.14);border-radius:16px;padding:10px;color:#fff;cursor:pointer}.mode.active{border-color:var(--cyan);box-shadow:0 0 0 4px rgba(102,231,255,.08)}.mode b{display:block}.mode span{font-size:11px;color:var(--muted)}
.code{direction:ltr;text-align:center;color:var(--gold2);font-size:38px;font-weight:1000;letter-spacing:7px;margin:8px 0}
.player{display:flex;align-items:center;justify-content:space-between;background:#0b1020;border:1px solid rgba(217,180,95,.13);border-radius:18px;padding:11px;margin:8px 0}.playerMain{display:flex;align-items:center;gap:10px}.av{width:42px;height:42px;border-radius:14px;background:#151b2b;display:grid;place-items:center;font-size:24px}.pill{font-size:12px;font-weight:900;border-radius:999px;padding:6px 9px;color:var(--muted);border:1px solid rgba(255,255,255,.1)}.pill.on{background:var(--green);color:#06110a;border-color:transparent}
.roleTitle{font-size:31px;font-weight:1000;margin:5px 0}.thief{color:var(--red)}.detective{color:var(--cyan)}.wait{display:none;margin-top:10px;padding:10px;border-radius:15px;background:#0b1020;border:1px solid rgba(217,180,95,.12);color:var(--muted);font-size:13px}.wait.show{display:block}
.status{position:sticky;top:5px;z-index:20;display:flex;gap:6px;margin:0 0 8px;padding:5px;border-radius:17px;background:rgba(5,7,13,.84);border:1px solid rgba(217,180,95,.14);backdrop-filter:blur(14px)}.stat{flex:1;text-align:center;background:rgba(12,16,27,.76);border:1px solid rgba(217,180,95,.10);border-radius:12px;padding:5px 3px}.stat b{display:block;color:var(--gold2);font-size:15px;line-height:1.05}.stat span{font-size:9.5px;color:var(--muted)}
.gameLayout{display:grid;grid-template-columns:1.18fr .82fr;gap:9px}@media(max-width:820px){.gameLayout{grid-template-columns:1fr}}
.rolebox{display:flex;align-items:center;justify-content:space-between;gap:9px;text-align:right;padding:8px 10px;margin-bottom:8px;border-radius:16px;background:linear-gradient(90deg,rgba(217,180,95,.10),rgba(59,16,27,.10));border:1px solid rgba(217,180,95,.17)}.rolebox .roleTitle{font-size:20px;margin:0}.rolebox .small{font-size:12px;color:#c7cfdf}
.museum{
  background-image:url("assets/showcase.png") !important;
  background-size:cover !important;
  background-position:center !important;
border-radius:18px;overflow:hidden;padding:8px;background:radial-gradient(circle at 50% 0%,rgba(243,217,147,.16),transparent 30%),linear-gradient(180deg,rgba(20,24,36,.96),rgba(5,7,13,.98));border:1px solid rgba(217,180,95,.20);box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 18px 60px rgba(0,0,0,.36)}
.museumHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;font-size:13px;color:#f1e7cf;font-weight:850}.alarm{font-size:10px;padding:3px 7px;border-radius:999px;background:rgba(59,16,27,.35);color:#f1c9cd;border:1px solid rgba(180,46,67,.30)}.alarm.on{box-shadow:0 0 18px rgba(255,76,106,.35)}
.items{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}@media(max-width:640px){.items{grid-template-columns:repeat(3,1fr)}}@media(max-width:430px){.items{grid-template-columns:repeat(2,1fr)}}
.item{min-height:104px;border-radius:18px;padding:7px 5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--text);background:linear-gradient(135deg,rgba(255,255,255,.09),transparent 22%),radial-gradient(circle at 50% 4%,rgba(243,217,147,.16),transparent 34%),linear-gradient(180deg,rgba(22,28,42,.96),rgba(7,10,17,.98));border:1px solid rgba(217,180,95,.20);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 10px 26px rgba(0,0,0,.22)}.item.selected{border-color:rgba(243,217,147,.78);box-shadow:0 0 0 3px rgba(217,180,95,.10),0 0 32px rgba(217,180,95,.18)}.item.disabled{opacity:.62;cursor:not-allowed}
.ico{width:42px;height:42px;display:grid;place-items:center;border-radius:50%;background:linear-gradient(135deg,rgba(217,180,95,.28),rgba(110,75,28,.16));border:1px solid rgba(217,180,95,.27)}.ico svg{width:27px;height:27px;fill:none;stroke:var(--gold2);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.name{font-size:11.5px;font-weight:850;text-align:center;line-height:1.15}.sector{font-size:9.5px;color:#b9b0a0;border:1px solid rgba(217,180,95,.15);padding:2px 6px;border-radius:999px;background:rgba(0,0,0,.16)}
.side h3{font-size:15px;margin:0 0 8px}.feed{display:flex;flex-direction:column;gap:6px;max-height:230px;overflow:auto}.hint,.msg{background:linear-gradient(180deg,rgba(13,18,30,.92),rgba(7,10,17,.96));border:1px solid rgba(217,180,95,.13);color:#ece5d7;border-radius:13px;padding:8px 9px;font-size:12.5px;line-height:1.45}.chat{margin-top:8px;display:grid;grid-template-columns:1fr auto;gap:8px}.chat input{text-align:right;padding:9px 10px;border-radius:13px;font-size:13px}.chatLog{margin-top:8px;display:grid;gap:5px;max-height:82px;overflow:auto}
.result{display:none;text-align:center;margin-top:10px;border-radius:22px;padding:15px;background:radial-gradient(circle at top,rgba(217,180,95,.18),transparent 40%),linear-gradient(180deg,rgba(18,22,34,.97),rgba(6,8,14,.98));border:1px solid rgba(217,180,95,.2)}.result.show{display:block}.result h2{margin:0 0 8px;color:var(--gold2)}.stamp{display:inline-flex;margin:6px auto 8px;padding:7px 15px;border:2px solid rgba(217,180,95,.55);border-radius:10px;color:var(--gold2);font-weight:1000;letter-spacing:1px;transform:rotate(-3deg);background:rgba(217,180,95,.07)}.artifact{width:82px;height:82px;margin:8px auto;border-radius:28px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(217,180,95,.28),rgba(59,16,27,.18));border:1px solid rgba(217,180,95,.28)}.artifact svg{width:50px;height:50px;fill:none;stroke:var(--gold2);stroke-width:1.65;stroke-linecap:round;stroke-linejoin:round}.replay{display:grid;gap:6px;margin-top:9px}.replay div{font-size:12px;background:#0b1020;border:1px solid rgba(217,180,95,.12);border-radius:12px;padding:7px}
.toast{position:fixed;right:50%;bottom:18px;transform:translateX(50%) translateY(25px);opacity:0;transition:.2s;background:#111827;color:#fff;border:1px solid rgba(217,180,95,.16);padding:12px 15px;border-radius:15px;z-index:110}.toast.show{opacity:1;transform:translateX(50%) translateY(0)}

/* ===== גרפיקה יוקרתית נקייה ===== */
body{
  background:
    radial-gradient(circle at 18% 0%,rgba(217,180,95,.16),transparent 28%),
    radial-gradient(circle at 84% 8%,rgba(75,20,35,.20),transparent 30%),
    radial-gradient(circle at 50% 110%,rgba(217,180,95,.09),transparent 36%),
    linear-gradient(145deg,#030408,#080e1a 48%,#030408) !important;
}
body:before{
  content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background-image:
    linear-gradient(rgba(217,180,95,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(217,180,95,.025) 1px,transparent 1px);
  background-size:44px 44px;
  mask-image:linear-gradient(to bottom,#000,transparent 90%);
}
.card{
  background:
    linear-gradient(180deg,rgba(18,25,40,.96),rgba(6,8,14,.985)) !important;
  border:1px solid rgba(217,180,95,.16) !important;
  box-shadow:0 24px 80px rgba(0,0,0,.48), inset 0 1px 0 rgba(255,255,255,.04) !important;
}
.museum{
  position:relative;
  background:
    radial-gradient(circle at 50% 0%,rgba(243,217,147,.18),transparent 30%),
    linear-gradient(90deg,transparent 0 10%,rgba(217,180,95,.06) 10.2% 10.8%,transparent 11% 24%,rgba(217,180,95,.045) 24.2% 24.8%,transparent 25% 75%,rgba(217,180,95,.045) 75.2% 75.8%,transparent 76% 89%,rgba(217,180,95,.06) 89.2% 89.8%,transparent 90%),
    linear-gradient(180deg,rgba(20,24,36,.97),rgba(5,7,13,.99)) !important;
  border:1px solid rgba(217,180,95,.23) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.055),
    inset 0 -32px 60px rgba(0,0,0,.22),
    0 18px 60px rgba(0,0,0,.38) !important;
}
.museum:after{
  content:"";
  position:absolute;
  inset:auto 0 0;
  height:24%;
  background:radial-gradient(ellipse at center,rgba(217,180,95,.09),transparent 65%);
  pointer-events:none;
}
.museumHead{position:relative;z-index:2;letter-spacing:.2px}
.items{position:relative;z-index:2}
.item{
  position:relative;
  overflow:hidden;
  background:
    linear-gradient(135deg,rgba(255,255,255,.10),transparent 24%),
    radial-gradient(circle at 50% 4%,rgba(243,217,147,.18),transparent 34%),
    linear-gradient(180deg,rgba(22,28,42,.97),rgba(7,10,17,.99)) !important;
  border:1px solid rgba(217,180,95,.23) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.085),
    inset 0 -12px 25px rgba(0,0,0,.24),
    0 10px 26px rgba(0,0,0,.24) !important;
  transition:.18s transform,.18s border-color,.18s box-shadow,.18s opacity;
}
.item:before{
  content:"";
  position:absolute;
  inset:7px 9px auto;
  height:28%;
  border-radius:14px;
  background:linear-gradient(135deg,rgba(255,255,255,.17),rgba(255,255,255,.025),transparent);
  pointer-events:none;
  opacity:.68;
}
.item:after{
  content:"";
  position:absolute;
  top:0;bottom:0;width:45%;
  right:-70%;
  transform:skewX(-20deg);
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
  opacity:0;
  pointer-events:none;
}
.item:hover{
  transform:translateY(-2px);
  border-color:rgba(243,217,147,.50) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.10),
    0 12px 34px rgba(217,180,95,.12),
    0 18px 46px rgba(0,0,0,.32) !important;
}
.item:hover:after,.item.selected:after{
  opacity:.85;
  animation:glassSweep 1.15s ease;
}
@keyframes glassSweep{
  from{right:-70%}
  to{right:125%}
}
.item.selected{
  border-color:rgba(243,217,147,.82) !important;
  box-shadow:0 0 0 3px rgba(217,180,95,.10),0 0 32px rgba(217,180,95,.20),inset 0 1px 0 rgba(255,255,255,.10) !important;
}
.ico{
  position:relative;z-index:1;
  background:
    radial-gradient(circle at 35% 25%,rgba(255,255,255,.28),transparent 23%),
    linear-gradient(135deg,rgba(217,180,95,.32),rgba(110,75,28,.17)) !important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 8px 18px rgba(0,0,0,.24);
}
.ico svg{
  filter:drop-shadow(0 2px 6px rgba(217,180,95,.18));
}
.name,.sector{position:relative;z-index:1}
.hint,.msg{
  background:linear-gradient(180deg,rgba(13,18,30,.94),rgba(7,10,17,.98)) !important;
  border-color:rgba(217,180,95,.15) !important;
}
.result.show{
  background:
    radial-gradient(circle at top,rgba(217,180,95,.20),transparent 42%),
    linear-gradient(180deg,rgba(18,22,34,.98),rgba(6,8,14,.99)) !important;
  border-color:rgba(217,180,95,.24) !important;
  box-shadow:0 22px 70px rgba(0,0,0,.44), inset 0 1px 0 rgba(255,255,255,.05);
}
.result h2{
  color:var(--gold2);
  font-weight:1000;
  letter-spacing:-.3px;
}
.stamp{
  text-shadow:0 0 16px rgba(217,180,95,.18);
}
.artifact{
  background:
    radial-gradient(circle at 35% 25%,rgba(255,255,255,.20),transparent 26%),
    linear-gradient(135deg,rgba(217,180,95,.30),rgba(59,16,27,.20)) !important;
  box-shadow:0 12px 34px rgba(0,0,0,.26), inset 0 1px 0 rgba(255,255,255,.09);
}
.alarm.on{
  animation:luxAlarm .7s ease-in-out infinite;
}
@keyframes luxAlarm{
  50%{box-shadow:0 0 20px rgba(255,76,106,.38);border-color:rgba(255,76,106,.46)}
}


/* ===== פופאפ סיום סיבוב ===== */
.result{
  display:none !important;
}
.resultModal{
  position:fixed;
  inset:0;
  z-index:120;
  display:none;
  align-items:center;
  justify-content:center;
  padding:18px;
  background:
    radial-gradient(circle at 50% 35%,rgba(217,180,95,.14),transparent 34%),
    rgba(3,5,10,.78);
  backdrop-filter:blur(12px);
}
.resultModal.show{
  display:flex;
  animation:modalFade .18s ease both;
}
@keyframes modalFade{
  from{opacity:0}
  to{opacity:1}
}
.resultModalCard{
  width:min(560px,94vw);
  max-height:88vh;
  overflow:auto;
  text-align:center;
  border-radius:28px;
  padding:22px 18px 18px;
  position:relative;
  background:
    radial-gradient(circle at top,rgba(217,180,95,.22),transparent 42%),
    linear-gradient(180deg,rgba(18,22,34,.98),rgba(6,8,14,.99));
  border:1px solid rgba(217,180,95,.26);
  box-shadow:
    0 26px 90px rgba(0,0,0,.58),
    inset 0 1px 0 rgba(255,255,255,.06);
  animation:modalPop .22s ease both;
}
@keyframes modalPop{
  from{transform:scale(.94) translateY(12px);opacity:.4}
  to{transform:scale(1) translateY(0);opacity:1}
}
.resultModalCard h2{
  margin:6px 0 10px;
  color:var(--gold2);
  font-size:clamp(30px,7vw,44px);
  line-height:1.05;
  font-weight:1000;
  letter-spacing:-.5px;
}
.modalClose{
  position:absolute;
  top:10px;
  left:10px;
  width:38px;
  height:38px;
  border-radius:50%;
  border:1px solid rgba(217,180,95,.22);
  background:rgba(7,10,17,.72);
  color:#f3d993;
  font-size:28px;
  line-height:1;
  cursor:pointer;
}
.resultModal .stamp{
  margin-top:8px;
}
.resultModal .artifact{
  margin-top:14px;
}
.resultModal .replay{
  margin-top:12px;
  max-height:170px;
  overflow:auto;
}
.resultModal .replay div{
  font-size:13px;
  background:rgba(8,13,24,.88);
}
@media(max-width:520px){
  .resultModal{
    padding:12px;
    align-items:center;
  }
  .resultModalCard{
    max-height:86vh;
    padding:20px 14px 16px;
    border-radius:24px;
  }
}


/* ===== שדרוג פריטים לסטייל 3D מוזיאוני ===== */
.item{
  min-height:128px !important;
  border-radius:22px !important;
  padding:10px 7px 12px !important;
  perspective:700px;
  transform-style:preserve-3d;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,236,180,.20), transparent 28%),
    linear-gradient(135deg, rgba(255,255,255,.105), transparent 24%),
    linear-gradient(180deg, rgba(25,31,46,.98), rgba(7,10,17,.99)) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.10),
    inset 0 -16px 28px rgba(0,0,0,.30),
    0 14px 30px rgba(0,0,0,.32),
    0 0 0 1px rgba(217,180,95,.10) !important;
}
.item:hover{
  transform:translateY(-3px) rotateX(2deg) !important;
}
.item.selected{
  transform:translateY(-3px) !important;
}
.item .ico{
  width:58px !important;
  height:58px !important;
  border-radius:22px !important;
  transform:translateZ(26px);
  background:
    radial-gradient(circle at 30% 22%, rgba(255,255,255,.58), transparent 18%),
    radial-gradient(circle at 67% 74%, rgba(0,0,0,.34), transparent 35%),
    linear-gradient(145deg, #f8e3a2 0%, #b9812f 42%, #322313 100%) !important;
  border:1px solid rgba(255,230,165,.48) !important;
  box-shadow:
    inset 0 2px 8px rgba(255,255,255,.28),
    inset 0 -10px 16px rgba(0,0,0,.34),
    0 10px 20px rgba(0,0,0,.38),
    0 0 22px rgba(217,180,95,.12) !important;
  margin-bottom:7px;
}
.item .ico:before{
  content:"";
  position:absolute;
  inset:7px 8px auto;
  height:22px;
  border-radius:16px;
  background:linear-gradient(135deg, rgba(255,255,255,.42), rgba(255,255,255,.04), transparent);
  pointer-events:none;
}
.item .ico:after{
  content:"";
  position:absolute;
  inset:auto 9px -9px;
  height:10px;
  border-radius:50%;
  background:radial-gradient(ellipse at center, rgba(0,0,0,.38), transparent 70%);
  filter:blur(2px);
}
.item .ico svg{
  width:34px !important;
  height:34px !important;
  stroke:#fff0b9 !important;
  stroke-width:1.9 !important;
  filter:
    drop-shadow(0 2px 2px rgba(0,0,0,.45))
    drop-shadow(0 0 7px rgba(255,225,145,.22)) !important;
  position:relative;
  z-index:2;
}
.item .name{
  font-size:12.5px !important;
  font-weight:950 !important;
  color:#fff4d5 !important;
  text-shadow:0 2px 10px rgba(0,0,0,.35);
  transform:translateZ(14px);
}
.item .sector{
  margin-top:2px;
  font-size:10px !important;
  padding:3px 8px !important;
  background:
    linear-gradient(180deg, rgba(255,255,255,.055), rgba(0,0,0,.22)) !important;
  border-color:rgba(217,180,95,.22) !important;
  color:#cfc3aa !important;
  transform:translateZ(10px);
}
.item:before{
  inset:8px 10px auto !important;
  height:34% !important;
  border-radius:18px !important;
  background:
    linear-gradient(135deg, rgba(255,255,255,.20), rgba(255,255,255,.045), transparent) !important;
  opacity:.78 !important;
}
.item .display-base{
  width:54px;
  height:10px;
  border-radius:50%;
  margin:-2px auto 1px;
  background:
    radial-gradient(ellipse at center, rgba(243,217,147,.42), rgba(217,180,95,.13) 50%, transparent 72%);
  box-shadow:0 4px 14px rgba(217,180,95,.10);
  transform:translateZ(8px);
}
.item.thief-lock:after{
  opacity:.95 !important;
}
.item.thief-lock{

    <div id="modalReplay" class="replay"></div>
    <div style="height:10px"></div>
    <button id="modalNextBtn" class="btn">סיבוב הבא</button>
    <button id="modalNewGameBtn" class="btn secondary" style="display:none;margin-top:8px">משחק חדש</button>
  </div>
</div>

<div id="toast" class="toast"></div>
<script>
const firebaseConfig={apiKey:"AIzaSyDgYh4IO8Ge3YLTyqJBKBDXFACsXaaszvQ",authDomain:"thief-game1234.firebaseapp.com",databaseURL:"https://thief-game1234-default-rtdb.firebaseio.com",projectId:"thief-game1234",storageBucket:"thief-game1234.firebasestorage.app",messagingSenderId:"675586862950",appId:"1:675586862950:web:30053456c19552b711a2a7"};
firebase.initializeApp(firebaseConfig);const db=firebase.database();const $=id=>document.getElementById(id);const screens={home:$("home"),lobby:$("lobby"),role:$("role"),game:$("game")};
const avatars=["🕵️","🥷","🧠","👑","🦊","🐺","🦅","💎","⚡","🎩"];const modes={quick:{label:"מהיר",rounds:3,duration:22},classic:{label:"מותח",rounds:5,duration:20},hard:{label:"קשה",rounds:7,duration:16}};
const itemsBase=[
["diamond","יהלום כחול","אגף מערבי"],
["crown","כתר עתיק","אגף מלכות"],
["watch","שעון זהב","חדר זכוכית"],
["scroll","מסמך סודי","ארכיון"],
["statue","פסל שיש","אולם מרכזי"],
["key","מפתח עתיק","כספת"]
].map(x=>({id:x[0],name:x[1],sector:x[2]}));
let state={roomCode:null,playerKey:null,playerId:"p_"+Math.random().toString(36).slice(2,9),room:null,listener:null,avatar:avatars[0],mode:"quick",timer:null};
function show(n){Object.values(screens).forEach(s=>s.classList.remove("active"));screens[n].classList.add("active");document.body.classList.toggle("gameOn",n==="game");window.scrollTo(0,0)}
function toast(t){$("toast").textContent=t;$("toast").classList.add("show");setTimeout(()=>$("toast").classList.remove("show"),2200)}
function ref(c){return db.ref("thiefDetectiveRooms/"+c)}function makeCode(){return Math.random().toString(36).slice(2,8).toUpperCase()}function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function pname(){return($("nameInput").value.trim()||"שחקן").slice(0,18)}function pData(){return{id:state.playerId,name:pname(),avatar:state.avatar,ready:false,role:null,roundReady:false,joinedAt:Date.now()}}
function baseRoom(c){return{code:c,status:"lobby",mode:state.mode,maxRounds:modes[state.mode].rounds,round:1,scores:{thief:0,detective:0},players:{},game:null,chat:{},createdAt:Date.now()}}
function roundData(r,mode){let arr=shuffle(itemsBase).slice(0,6);return{round:r,phase:"role",items:arr,duration:Math.max(10,modes[mode].duration-Math.floor(r/2)),startedAt:null,thiefChoiceId:null,detectiveGuessId:null,winner:null,hints:[],replay:[]}}

function icon(id){
 const imageMap = {
   diamond: "assets/diamond.png",
   crown: "assets/crown.png",
   watch: "assets/watch.png",
   scroll: "assets/scroll.png",
   statue: "assets/statue.png",
   key: "assets/key.png"
 };
 if(imageMap[id]){
   return `<img src="${imageMap[id]}" style="width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 8px 14px rgba(0,0,0,.45));">`;
 }
 // fallback for remaining items
 return `<div style="font-size:28px">💎</div>`;
}

function renderAvatars(){let g=$("avatarGrid");g.innerHTML="";avatars.forEach(a=>{let b=document.createElement("button");b.className="avatar"+(a===state.avatar?" active":"");b.textContent=a;b.onclick=()=>{state.avatar=a;renderAvatars()};g.appendChild(b)})}
document.querySelectorAll(".mode").forEach(b=>b.onclick=()=>{document.querySelectorAll(".mode").forEach(x=>x.classList.remove("active"));b.classList.add("active");state.mode=b.dataset.mode});
async function createRoom(){let c=makeCode();state.roomCode=c;state.playerKey="p1";let r=baseRoom(c);r.players.p1=pData();await ref(c).set(r);listen(c);$("codeText").textContent=c;show("lobby")}
async function joinRoom(){let c=$("joinInput").value.trim().toUpperCase();if(!c)return toast("צריך קוד חדר");let s=await ref(c).once("value");if(!s.exists())return toast("לא נמצא חדר");let r=s.val();if(r.players&&r.players.p2)return toast("החדר מלא");state.roomCode=c;state.playerKey="p2";await ref(c).child("players/p2").set(pData());listen(c);$("codeText").textContent=c;show("lobby")}
function listen(c){if(state.listener)state.listener.off();state.listener=ref(c);state.listener.on("value",s=>{let r=s.val();if(r)receive(r)})}
function receive(r){state.room=r;if(r.status==="lobby"){show("lobby");renderLobby();maybeStart();return}if(r.status==="playing"){if(r.game.phase==="role"){showRole();return}show("game");renderGame()}}
function renderLobby(){let p=state.room.players||{};$("lobbyStatus").textContent=Object.keys(p).length<2?"ממתין לשחקן נוסף...":"שני השחקנים בפנים. לחצו מוכן.";let box=$("playersBox");box.innerHTML="";["p1","p2"].forEach(k=>{let pl=p[k];let d=document.createElement("div");d.className="player";d.innerHTML=pl?`<div class="playerMain"><div class="av">${pl.avatar}</div><div><b>${pl.name}</b><div class="small">${k==="p1"?"יוצר החדר":"שחקן שני"}</div></div></div><div class="pill ${pl.ready?"on":""}">${pl.ready?"מוכן":"לא מוכן"}</div>`:`<div class="playerMain"><div class="av">?</div><div><b>ממתין...</b><div class="small">שלח לו את הקוד</div></div></div><div class="pill">ריק</div>`;box.appendChild(d)});$("readyBtn").textContent=p[state.playerKey]?.ready?"בטל מוכן":"אני מוכן"}
async function toggleReady(){await ref(state.roomCode).child("players/"+state.playerKey+"/ready").set(!state.room.players[state.playerKey].ready)}
async function maybeStart(){if(state.playerKey!=="p1")return;let p=state.room.players||{};if(p.p1&&p.p2&&p.p1.ready&&p.p2.ready){let roles=Math.random()>.5?{p1:"thief",p2:"detective"}:{p1:"detective",p2:"thief"};let game=roundData(1,state.room.mode);await ref(state.roomCode).update({status:"playing",round:1,game});await ref(state.roomCode).child("players/p1").update({role:roles.p1,roundReady:false});await ref(state.roomCode).child("players/p2").update({role:roles.p2,roundReady:false})}}
function myRole(){return state.room.players[state.playerKey].role}
function showRole(){$("resultModal")?.classList.remove("show");let role=myRole();$("roleReveal").textContent=role==="thief"?"גנב":"בלש";$("roleReveal").className="roleTitle "+(role==="thief"?"thief":"detective");$("roleText").textContent=role==="thief"?"בחר חפץ בלי שהבלש יזהה אותך.":"נסה לזהות את החפץ שהגנב בחר.";let mine=state.room.players[state.playerKey].roundReady;$("startRoundBtn").disabled=!!mine;$("startRoundBtn").textContent=mine?"מחכה לשחקן השני...":"הבנתי, להתחיל";$("waitBox").classList.toggle("show",!!mine);show("role");maybeBegin()}
async function markRoundReady(){await ref(state.roomCode).child("players/"+state.playerKey+"/roundReady").set(true)}
async function maybeBegin(){if(state.playerKey!=="p1")return;let p=state.room.players;if(state.room.game.phase==="role"&&p.p1.roundReady&&p.p2.roundReady){await ref(state.roomCode).child("game").update({phase:"playing",startedAt:firebase.database.ServerValue.TIMESTAMP})}}
function renderGame(){if(state.room?.game?.phase!=="ended")$("resultModal")?.classList.remove("show");let r=state.room,g=r.game,role=myRole();$("round").textContent=`${r.round}/${r.maxRounds}`;$("score").textContent=`${r.scores.thief}:${r.scores.detective}`;$("modeText").textContent=modes[r.mode].label;$("myRole").textContent=role==="thief"?"גנב":"בלש";$("myRole").className="roleTitle "+(role==="thief"?"thief":"detective");$("instruction").textContent=role==="thief"?"בחר חפץ לגניבה. הבלש לא יראה מה בחרת.":"בחר את החפץ שאתה חושב שהגנב בחר.";$("alarm").textContent=g.thiefChoiceId?"אזעקה פעילה":"מערכת שקטה";$("alarm").className="alarm "+(g.thiefChoiceId?"on":"");renderItems();renderHints();renderChat();renderResult();timerLoop()}
function renderItems(){
  let g=state.room.game,role=myRole(),box=$("items");
  box.className="items museumGrid";
  box.innerHTML="";
  const slotOrder=["key","diamond","watch","statue","scroll","crown"];
  const sorted=slotOrder.map(id=>g.items.find(x=>x.id===id)).filter(Boolean);
  g.items.forEach(x=>{ if(!sorted.find(y=>y.id===x.id)) sorted.push(x); });
  sorted.slice(0,6).forEach((it,i)=>{
    let selected=role==="thief"?it.id===g.thiefChoiceId:it.id===g.detectiveGuessId;
    let selectClass=selected?(role==="thief"?"selected thief-lock ":"selected detective-mark "):"";
    let b=document.createElement("button");
    b.className="item museum-pos-"+i+" "+selectClass+(g.phase!=="playing"?"disabled":"");
    b.dataset.item=it.id;
    b.setAttribute("aria-label",it.name);
    b.innerHTML=`<div class="badge3d">${role==="thief"?"נעול":"חשוד"}</div><div class="ico">${icon(it.id)}</div><div class="display-base"></div><div class="name">${it.name}</div><div class="sector">${role==="detective"?it.sector:"ויטרינה מאובטחת"}</div>`;
    b.onclick=()=>{if(g.phase!=="playing")return;if(role==="thief")chooseThief(it);else chooseDetective(it)};
    box.appendChild(b);
  });
}
async function chooseThief(it){let g=state.room.game;if(g.thiefChoiceId)return toast("כבר בחרת חפץ");await ref(state.roomCode).child("game/thiefChoiceId").set(it.id);await replay("הגנב התחיל פעולה ליד "+it.name);addHints(it)}
async function chooseDetective(it){let g=state.room.game;if(g.detectiveGuessId)return;await ref(state.roomCode).child("game/detectiveGuessId").set(it.id);finish(it.id===g.thiefChoiceId?"detective":"thief")}
async function addHints(it){let hints=[`מצלמה זיהתה תנועה באזור: ${it.sector}`,"חיישן קרבה הופעל ליד ויטרינה חשובה",`נשמע צליל זכוכית קל ליד ${it.name}`];hints.forEach((h,i)=>setTimeout(async()=>{let s=await ref(state.roomCode).child("game/hints").once("value");let arr=s.val()||[];await ref(state.roomCode).child("game/hints").set([...arr,{text:h,at:Date.now()}])},700+i*1800))}
async function replay(t){let s=await ref(state.roomCode).child("game/replay").once("value");let arr=s.val()||[];await ref(state.roomCode).child("game/replay").set([...arr,{text:t,at:Date.now()}])}
function renderHints(){let arr=state.room.game.hints||[];$("hints").innerHTML=arr.length?arr.slice(-8).reverse().map(h=>`<div class="hint">${h.text}</div>`).join(""):`<div class="hint">עוד אין רמזים. כשהגנב יבחר חפץ, מערכת האבטחה תתחיל לדווח.</div>`}
function timerLoop(){clearInterval(state.timer);state.timer=setInterval(()=>{let g=state.room?.game;if(!g||g.phase!=="playing"||!g.startedAt)return;let left=Math.max(0,Math.ceil((g.duration*1000-(Date.now()-g.startedAt))/1000));$("timer").textContent=left;if(left<=0&&state.playerKey==="p1"&&g.phase==="playing")finish("thief")},500)}
async function finish(winner){let r=state.room,g=r.game;if(g.phase==="ended")return;let scores={thief:r.scores.thief+(winner==="thief"?1:0),detective:r.scores.detective+(winner==="detective"?1:0)};await ref(state.roomCode).child("scores").set(scores);await ref(state.roomCode).child("game/winner").set(winner);await ref(state.roomCode).child("game/phase").set("ended");await replay(winner==="detective"?"הבלש תפס את הגנב":"הגנב ברח מהמוזיאון")}
function renderResult(){
 let g=state.room.game;
 let modal=$("resultModal");
 if(g.phase!=="ended"){
   modal.classList.remove("show");
   return;
 }

 modal.classList.add("show");
 let target=g.items.find(x=>x.id===g.thiefChoiceId);
 $("modalResultTitle").textContent=g.winner==="detective"?"הבלש תפס את הגנב!":"הגנב ברח עם השלל!";
 $("modalResultText").innerHTML=`<div class="stamp">${g.winner==="detective"?"CASE CLOSED":"ESCAPED"}</div><div class="artifact">${target?icon(target.id):""}</div><div>החפץ היה: <b>${target?target.name:"לא נבחר"}</b></div>`;
 $("modalReplay").innerHTML=(g.replay||[]).slice(-5).map(x=>`<div>${x.text}</div>`).join("");

 let done=state.room.round>=state.room.maxRounds;
 $("modalNextBtn").style.display=done?"none":"";
 $("modalNewGameBtn").style.display=done?"":"none";
}
async function nextRound(){if(state.playerKey!=="p1")return toast("רק יוצר החדר מתחיל סיבוב הבא");let nr=state.room.round+1,old={p1:state.room.players.p1.role,p2:state.room.players.p2.role};let game=roundData(nr,state.room.mode);await ref(state.roomCode).child("round").set(nr);await ref(state.roomCode).child("game").set(game);await ref(state.roomCode).child("players/p1").update({role:old.p2,roundReady:false});await ref(state.roomCode).child("players/p2").update({role:old.p1,roundReady:false})}
async function newGame(){if(state.playerKey!=="p1")return toast("רק יוצר החדר מתחיל משחק חדש");await ref(state.roomCode).update({status:"lobby",round:1,scores:{thief:0,detective:0},game:null});await ref(state.roomCode).child("players/p1").update({ready:false,roundReady:false});await ref(state.roomCode).child("players/p2").update({ready:false,roundReady:false})}
async function sendChat(){let t=$("chatInput").value.trim();if(!t)return;$("chatInput").value="";let p=state.room.players[state.playerKey];await ref(state.roomCode).child("chat").push({text:t,from:p.name,avatar:p.avatar,at:Date.now()})}
function renderChat(){let arr=Object.values(state.room.chat||{}).sort((a,b)=>a.at-b.at).slice(-6);$("chatLog").innerHTML=arr.map(m=>`<div class="msg">${m.avatar} ${m.from}: ${m.text}</div>`).join("")}
$("createBtn").onclick=createRoom;$("joinBtn").onclick=joinRoom;$("readyBtn").onclick=toggleReady;$("startRoundBtn").onclick=markRoundReady;$("nextBtn").onclick=nextRound;$("newGameBtn").onclick=newGame;$("modalNextBtn").onclick=nextRound;$("modalNewGameBtn").onclick=newGame;$("closeResultModal").onclick=()=>$("resultModal").classList.remove("show");$("sendBtn").onclick=sendChat;$("leaveBtn").onclick=()=>location.reload();$("copyBtn").onclick=()=>navigator.clipboard?.writeText(state.roomCode||"");$("joinInput").oninput=e=>e.target.value=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,"");renderAvatars();
</script>
</body>
</html>
